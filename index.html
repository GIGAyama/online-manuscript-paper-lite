<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png">
  <title>オンライン原稿用紙 Lite</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Zen+Old+Mincho:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Zen Maru Gothic"', 'sans-serif'],
            genko: ['"Zen Old Mincho"', 'serif'],
          },
          colors: {
            paper: '#fdfbf7',
            genkoLine: 'rgba(46, 125, 50, 0.4)',
            genkoStrong: 'rgba(46, 125, 50, 0.8)',
          }
        }
      }
    }
  </script>

  <style>
    /* カスタムスクロールバー */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .vertical-rl { writing-mode: vertical-rl; text-orientation: mixed; }

    /* モーダルアニメーション */
    @keyframes modalFadeIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    .animate-modal { animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* 印刷用CSS */
    @media screen {
        .print-only { display: none !important; }
    }
    @media print {
        body { background: white; margin: 0; padding: 0; font-family: "Zen Old Mincho", serif; }
        body > #root > div > .no-print { display: none !important; }
        body > #root > div > .print-only { display: block !important; position: absolute; left: 0; top: 0; width: 100%; background: white; z-index: 9999; }
        @page { size: A4 landscape; margin: 0; }
        
        .print-page {
            width: 297mm; height: 210mm;
            page-break-after: always;
            position: relative;
            box-sizing: border-box;
            padding: 10mm;
            background: white;
        }
        .print-layout-grid {
            width: 100%; height: 100%;
            display: grid;
            grid-template-columns: 1fr 16mm 1fr;
            border: 2px solid #2e7d32;
        }
        .print-gyobi-area {
            border-left: 1px solid #2e7d32;
            border-right: 1px solid #2e7d32;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #2e7d32;
        }
        .gyobi-content {
            writing-mode: vertical-rl; display: flex; align-items: center; gap: 10mm;
        }
        .gyobi-mark {
            border: 1px solid #2e7d32; width: 6mm; height: 10mm; border-radius: 50% 50% 0 0; margin-bottom: 5mm;
        }
        .print-half-grid { display: flex; flex-direction: row-reverse; }
        .print-line {
            flex: 1; display: flex; flex-direction: column; border-left: 1px solid rgba(46,125,50,0.4);
        }
        .print-half-grid.right-side .print-line:first-child { border-right: none; }
        .print-half-grid.left-side .print-line:first-child { border-right: none; }
        .print-cell {
            flex: 1; border-bottom: 1px solid rgba(46,125,50,0.4);
            display: flex; align-items: center; justify-content: center; position: relative;
            writing-mode: vertical-rl; text-orientation: mixed;
        }
        .hanging-chars-print {
            position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            white-space: nowrap; writing-mode: vertical-rl; font-size: 0.6em;
            margin-top: -2mm; line-height: 1;
        }
    }
  </style>
</head>
<body class="selection:bg-amber-200 bg-amber-50/40 text-slate-800 overflow-hidden print:overflow-visible">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    const STORAGE_KEY = 'genko_lite_v2';

    // ==========================================
    // ユーティリティ・共通コンポーネント
    // ==========================================

    // 小学生向けルビコンポーネント
    const Rb = ({ t, r }) => (
      <ruby className="relative inline-block text-center align-baseline leading-none">
        {t}<rt className="absolute bottom-full left-1/2 -translate-x-1/2 whitespace-nowrap text-[0.6em] text-slate-500 pointer-events-none mb-[0.1em] font-medium tracking-normal" style={{ letterSpacing: 'normal' }}>{r}</rt>
      </ruby>
    );

    // 共通モーダルコンポーネント
    const Modal = ({ isOpen, onClose, title, children, maxWidth = 'max-w-md' }) => {
      useEffect(() => {
        const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
        if (isOpen) window.addEventListener('keydown', handleEsc);
        return () => window.removeEventListener('keydown', handleEsc);
      }, [isOpen, onClose]);

      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 no-print">
          <div className={`bg-white rounded-2xl shadow-2xl w-full ${maxWidth} flex flex-col overflow-hidden transform transition-all animate-modal`}>
            <div className="flex justify-between items-center p-4 sm:p-5 border-b border-slate-100 bg-slate-50/50">
              <h3 className="font-bold text-lg text-slate-800 pt-1">{title}</h3>
              <button onClick={onClose} className="p-1.5 hover:bg-slate-200 rounded-full text-slate-500 transition-all active:scale-90">
                <i className="bi bi-x-lg text-[20px]"></i>
              </button>
            </div>
            <div className="p-4 sm:p-5">{children}</div>
          </div>
        </div>
      );
    };

    // プレビュー領域を画面サイズに合わせて自動縮小するラッパー
    const ScalableWrapper = ({ children, scrollContainerRef, onScroll }) => {
        const wrapperRef = useRef(null);
        const containerRef = useRef(null); 
        const contentRef = useRef(null);
        const [scale, setScale] = useState(1);
        const [dims, setDims] = useState({ w: 0, h: 0 });

      useEffect(() => {
        let reqId;
        const updateScale = () => {
          if (!containerRef.current || !contentRef.current) return;
          const availableH = containerRef.current.clientHeight - 40; // 上下余白
          const firstChild = contentRef.current.firstElementChild;
          if (!firstChild) return;
          
          const originalW = firstChild.offsetWidth; 
          const originalH = firstChild.offsetHeight;

          if (originalH > 10 && availableH > 10) {
            let s = availableH / originalH;
            
            // 【変更点】 拡大制限 (if (s > 1) s = 1;) を解除し、画面の高さに合わせて拡大するように修正
            if (s > 3) s = 3; // 念のため極端な拡大（3倍以上）は防ぐ
            if (s < 0.1) s = 0.1;
            
            setDims(prev => {
              if (prev.w !== originalW || prev.h !== originalH) {
                return { w: originalW, h: originalH };
              }
              return prev;
            });
            setScale(s);
          }
        };

        const observer = new ResizeObserver(() => { reqId = requestAnimationFrame(updateScale); });
        if (containerRef.current) observer.observe(containerRef.current);
        if (contentRef.current && contentRef.current.firstElementChild) observer.observe(contentRef.current.firstElementChild);

        updateScale(); setTimeout(updateScale, 100);
        return () => { observer.disconnect(); cancelAnimationFrame(reqId); };
      }, [children]);

      // 縦・横どちらのスクロール操作でも、プレビュー画面を横スクロールさせる
      useEffect(() => {
        const wrapper = wrapperRef.current;
        const container = containerRef.current;
        if (!wrapper || !container) return;

        const handleWheel = (e) => {
          // ブラウザのズーム機能（Ctrl+ホイール等）は妨害しない
          if (e.ctrlKey || e.shiftKey || e.altKey) return;

          e.preventDefault(); 
          
          let scrollAmount = 0;
          if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
            scrollAmount = -e.deltaY;
          } else {
            scrollAmount = e.deltaX;
          }

          if (typeof container.scrollBy === 'function') {
            container.scrollBy({ left: scrollAmount, behavior: 'auto' });
          } else {
            container.scrollLeft += scrollAmount;
          }
        };

        wrapper.addEventListener('wheel', handleWheel, { passive: false });
        return () => wrapper.removeEventListener('wheel', handleWheel);
      }, []);

      return (
        <div ref={wrapperRef} className="absolute inset-0 bg-slate-100/50 overflow-hidden">
          <div 
            ref={(el) => {
              containerRef.current = el;
              if (scrollContainerRef) scrollContainerRef.current = el;
            }} 
            onScroll={onScroll}
            className="w-full h-full overflow-auto relative hide-scrollbar p-6" 
            style={{ direction: 'rtl' }}>
            <div style={{ direction: 'ltr' }} className="flex-shrink-0 w-max h-max mx-auto">
              {/* 【変更点】 transition-all duration-300 ease-out を削除し、開いた瞬間にスナップするように修正 */}
              <div style={{ width: dims.w > 0 ? dims.w * scale : '100%', height: dims.h > 0 ? dims.h * scale : '100%', position: 'relative' }}>
                <div ref={contentRef} style={{ transform: `scale(${scale})`, transformOrigin: 'top right', position: 'absolute', top: 0, right: 0 }} className="shadow-xl rounded-sm bg-paper inline-block border border-slate-200">
                  {children}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // カスタムフック (原稿用紙ロジック)
    // ==========================================

    const useGenkoParser = (doc, settings) => {
        return useMemo(() => {
            const chars = settings.charsPerLine;
            const kinsokuMode = settings.kinsokuMode || 'burasagari';
            const lines = [];
            
            // --- ヘッダー生成（題名・学年・氏名） ---
            const titleParas = (doc.title || '').split('\n');
            titleParas.forEach(p => {
                if(!p && lines.length === 0) return;
                let line = Array(chars).fill('');
                let cursor = 2; // 2マス下げる
                p.split('').forEach(c => {
                    if(cursor >= chars) { lines.push(line); line = Array(chars).fill(''); cursor = 0; }
                    line[cursor++] = c;
                });
                lines.push(line);
            });
            if(lines.length === 0 || (doc.title && lines.length > 0)) lines.push(Array(chars).fill(''));

            const footerText = (`${doc.class || ''} ${doc.name || ''}`).trim();
            if(footerText) {
                let line = Array(chars).fill('');
                let start = Math.max(0, chars - footerText.length - 1); // 下から1マス空ける
                footerText.split('').forEach((c, i) => {
                    if(start + i < chars) line[start + i] = c;
                });
                lines.push(line);
                lines.push(Array(chars).fill(''));
            }

            // --- 本文生成（禁則処理と圧縮） ---
            const noStart = ['、','。','」','』','）','っ','ゃ','ゅ','ょ','ッ','ャ','ュ','ョ','ー',',','.','」','』',']','}','>','ぁ','ぃ','ぅ','ぇ','ぉ','ァ','ィ','ゥ','ェ','ォ','ヮ','ヵ','ヶ','・','？','！','‼','⁇','々'];
            const noEnd = ['「', '『', '（', '(', '[', '{', '<', '【', '〔', '［'];
            const compressionPairs = ['。」', '。』', '。）', '、」', '、』', '、）', '！』', '！」', '？』', '？」'];
            
            (doc.content || '').split('\n').forEach(p => {
                if(!p) { lines.push(Array(chars).fill('')); return; }
                let line = [];
                const pChars = p.split('');
                let i = 0;
                
                while(i < pChars.length) {
                    let char = pChars[i];
                    
                    // 文字の圧縮（。」などを1マスに）
                    if (i < pChars.length - 1) {
                        const pair = char + pChars[i+1];
                        if (compressionPairs.includes(pair)) { char = pair; i++; }
                    }
                    
                    // 行末の行頭禁則回避（追い出し）
                    if (line.length === chars - 1) {
                        if (noEnd.includes(char.charAt(0))) {
                            lines.push(line); line = []; line.push(char); i++; continue;
                        }
                    }
                    
                    line.push(char); i++;
                    
                    // 行がいっぱいになったら
                    if (line.length >= chars) {
                        if (kinsokuMode === 'oidashi') {
                            // 追い出し処理：次の文字が行頭禁則なら、今の行の最後を次行に送る
                            if (i < pChars.length) {
                                let nextUnit = pChars[i];
                                if (i < pChars.length - 1) {
                                    const nextPair = pChars[i] + pChars[i+1];
                                    if (compressionPairs.includes(nextPair)) nextUnit = nextPair;
                                }
                                if (noStart.includes(nextUnit.charAt(0))) {
                                    const kicked = line.pop();
                                    lines.push(line);
                                    line = [kicked];
                                    continue;
                                }
                            }
                            lines.push(line); line = [];
                        } else {
                            // ぶら下がり処理
                            while (i < pChars.length) {
                                let nextStartChar = pChars[i];
                                let nextUnit = nextStartChar;
                                let step = 1;
                                if (i < pChars.length - 1) {
                                    const nextPair = nextStartChar + pChars[i+1];
                                    if (compressionPairs.includes(nextPair)) { nextUnit = nextPair; step = 2; }
                                }
                                if (noStart.includes(nextUnit.charAt(0))) {
                                    line.push(nextUnit); i += step;
                                } else { break; }
                            }
                            lines.push(line); line = [];
                        }
                    }
                }
                if(line.length > 0) lines.push(line);
            });
            
            return lines;
        }, [doc, settings.charsPerLine, settings.kinsokuMode]);
    };

    // ==========================================
    // UI コンポーネント
    // ==========================================

    const Header = ({ onSettingClick }) => (
        <nav className="bg-white border-b-4 border-amber-500 px-4 md:px-6 py-2.5 flex justify-between items-center shrink-0 shadow-sm z-10 no-print">
            <div className="flex items-center gap-3 hover:opacity-80 transition-all">
                <div className="p-2 rounded-xl text-white shadow-sm bg-amber-500">
                    <i className="bi bi-pencil-square text-[24px]"></i>
                </div>
                <div className="flex items-baseline gap-2">
                    <span className="font-bold text-lg md:text-xl tracking-wide pt-2 text-amber-600">オンライン<Rb t="原稿用紙" r="げんこうようし"/></span>
                    <span className="px-2 py-0.5 rounded-full text-xs font-bold text-white shadow-sm bg-amber-500 relative -top-[1px]">Lite</span>
                </div>
            </div>
            <button onClick={onSettingClick} className="p-2 pt-3 text-slate-500 hover:bg-slate-100 rounded-full transition-all active:scale-95" title="設定">
                <i className="bi bi-gear text-[22px]"></i>
            </button>
        </nav>
    );

    // 行単位での再レンダリングを防ぐためのメモ化コンポーネント（極限最適化）
    const GenkoLine = React.memo(({ rowData, chars, cellSize, isFirst, isLast }) => {
        return (
            <div className={`flex flex-col flex-shrink-0 border-l border-genkoLine ${isFirst ? 'border-r border-genkoStrong' : ''} ${isLast ? 'border-l-genkoStrong' : ''}`}>
                {Array.from({ length: chars }).map((_, j) => (
                    <div key={j} className={`vertical-rl flex items-center justify-center border-b border-genkoLine relative flex-shrink-0 ${cellSize} ${j === chars - 1 ? 'border-b-0' : ''}`}>
                        {rowData[j] || ''}
                        {/* ぶら下がり文字 */}
                        {j === chars - 1 && rowData.length > chars && (
                            <div className="absolute top-full left-1/2 -translate-x-1/2 whitespace-nowrap vertical-rl text-[0.7em] leading-none mt-1 pointer-events-none text-black z-10">
                                {rowData.slice(chars).join('')}
                            </div>
                        )}
                    </div>
                ))}
            </div>
        );
    }, (prevProps, nextProps) => {
        // 設定が変わった場合は再描画
        if (prevProps.chars !== nextProps.chars) return false;
        if (prevProps.cellSize !== nextProps.cellSize) return false;
        if (prevProps.isFirst !== nextProps.isFirst) return false;
        if (prevProps.isLast !== nextProps.isLast) return false;
        
        // 配列の中身を浅く比較して、変更がなければ再描画をスキップ（高速化の肝）
        const prevRow = prevProps.rowData || [];
        const nextRow = nextProps.rowData || [];
        if (prevRow.length !== nextRow.length) return false;
        for (let i = 0; i < prevRow.length; i++) {
            if (prevRow[i] !== nextRow[i]) return false;
        }
        return true;
    });

    const GenkoPaperPreview = ({ parsedGenko, settings }) => {
        const chars = settings.charsPerLine;
        const linesPerPage = chars === 20 ? 20 : 16;
        const cellSize = chars === 20 ? 'w-[2.8rem] h-[2.8rem] text-[1.6rem]' : 'w-[3.6rem] h-[3.6rem] text-[2.0rem]';
        
        // 常に1ページ（20行 or 16行）の倍数で描画し、用紙の形を綺麗に保つ
        const pageCount = Math.ceil(parsedGenko.length / linesPerPage) || 1;
        const renderLen = pageCount * linesPerPage;

        return (
            <div className="flex flex-row-reverse p-10 gap-8 font-genko w-max text-slate-800">
                <div className="flex flex-row-reverse border-y border-genkoStrong">
                    {Array.from({ length: renderLen }).map((_, i) => {
                        const rowData = parsedGenko[i] || [];
                        const isFirst = i === 0;
                        const isLast = i === renderLen - 1;
                        return (
                            <GenkoLine 
                                key={i} 
                                rowData={rowData} 
                                chars={chars} 
                                cellSize={cellSize} 
                                isFirst={isFirst} 
                                isLast={isLast} 
                            />
                        );
                    })}
                </div>
            </div>
        );
    };

    const PrintGenkoView = ({ parsedGenko, settings, doc }) => {
        const chars = settings.charsPerLine;
        const linesPerPage = chars === 20 ? 20 : 16;
        const halfLines = linesPerPage / 2;
        const pageCount = Math.ceil(parsedGenko.length / linesPerPage) || 1;
        const fontSize = chars === 20 ? '16pt' : '20pt';

        const pages = Array.from({ length: pageCount }, (_, i) => {
            return parsedGenko.slice(i * linesPerPage, (i + 1) * linesPerPage);
        });

        const shortTitle = (doc.title || '無題').substring(0, 10);

        return (
            <div className="print-only font-genko">
                {pages.map((pageLines, pIndex) => (
                    <div key={pIndex} className="print-page">
                        <div className="print-layout-grid">
                            
                            {/* 左半分のグリッド（表示は左側、内容は後半の行） */}
                            <div className="print-half-grid left-side">
                                {Array.from({ length: halfLines }).map((_, i) => {
                                    const actualIndex = i + halfLines;
                                    const lineData = pageLines[actualIndex] || [];
                                    return (
                                        <div key={actualIndex} className="print-line">
                                            {Array.from({ length: chars }).map((_, j) => (
                                                <div key={j} className="print-cell" style={{ fontSize }}>
                                                    {lineData[j] || ''}
                                                    {j === chars - 1 && lineData.length > chars && (
                                                        <div className="hanging-chars-print">
                                                            {lineData.slice(chars).join('')}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>

                            {/* 中央の魚尾（とじしろ）エリア */}
                            <div className="print-gyobi-area">
                                <div className="gyobi-content">
                                    <div className="gyobi-mark"></div>
                                    <div className="font-bold">{shortTitle}</div>
                                    <div className="text-[0.8em] mt-[5mm]">{pIndex + 1}</div>
                                </div>
                            </div>

                            {/* 右半分のグリッド（表示は右側、内容は前半の行） */}
                            <div className="print-half-grid right-side">
                                {Array.from({ length: halfLines }).map((_, i) => {
                                    const lineData = pageLines[i] || [];
                                    return (
                                        <div key={i} className="print-line">
                                            {Array.from({ length: chars }).map((_, j) => (
                                                <div key={j} className="print-cell" style={{ fontSize }}>
                                                    {lineData[j] || ''}
                                                    {j === chars - 1 && lineData.length > chars && (
                                                        <div className="hanging-chars-print">
                                                            {lineData.slice(chars).join('')}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    );
                                })}
                            </div>

                        </div>
                    </div>
                ))}
            </div>
        );
    };

    // ==========================================
    // メインアプリケーション
    // ==========================================

    const App = () => {
        const [settings, setSettings] = useState({ charsPerLine: 20, kinsokuMode: 'burasagari' });
        const [doc, setDoc] = useState({ title: '', class: '', name: '', content: '' });
        const [isInitialLoad, setIsInitialLoad] = useState(true);
        const [isSettingsModalOpen, setSettingsModalOpen] = useState(false);

        const handleChange = (e) => setDoc(prev => ({ ...prev, [e.target.name]: e.target.value }));
        const charCount = (doc.content || '').length;

        // スクロール同期用のRefとフラグ
        const textareaRef = useRef(null);
        const previewContainerRef = useRef(null);
        const isSyncingLeft = useRef(false);
        const isSyncingRight = useRef(false);

        // エディタのスクロールに合わせて原稿用紙を同期
        const handleTextareaScroll = useCallback(() => {
            if (isSyncingRight.current) return;
            const left = textareaRef.current;
            const right = previewContainerRef.current;
            if (!left || !right) return;

            isSyncingLeft.current = true;
            const scrollableHeight = left.scrollHeight - left.clientHeight;
            const ratio = scrollableHeight > 0 ? left.scrollTop / scrollableHeight : 0;
            
            const scrollableWidth = right.scrollWidth - right.clientWidth;
            // RTLのscrollLeftはChrome/Edge等で負の値になる
            right.scrollLeft = -scrollableWidth * ratio;

            setTimeout(() => { isSyncingLeft.current = false; }, 50);
        }, []);

        // 原稿用紙のスクロールに合わせてエディタを同期
        const handlePreviewScroll = useCallback(() => {
            if (isSyncingLeft.current) return;
            const left = textareaRef.current;
            const right = previewContainerRef.current;
            if (!left || !right) return;

            isSyncingRight.current = true;
            const scrollableWidth = right.scrollWidth - right.clientWidth;
            const ratio = scrollableWidth > 0 ? Math.abs(right.scrollLeft) / scrollableWidth : 0;

            const scrollableHeight = left.scrollHeight - left.clientHeight;
            left.scrollTop = scrollableHeight * ratio;

            setTimeout(() => { isSyncingRight.current = false; }, 50);
        }, []);

        const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });

        // 初期データの復元
        useEffect(() => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    setDoc({ title: data.title||'', class: data.class||'', name: data.name||'', content: data.content||'' });
                    if (data.charsPerLine) {
                        setSettings({ 
                            charsPerLine: data.charsPerLine,
                            kinsokuMode: data.kinsokuMode || 'burasagari'
                        });
                    }
                    Toast.fire({ icon: 'info', html: '<span class="font-bold">前回の続きから始めます</span>' });
                } catch (e) { console.error('Restore error', e); }
            }
            setIsInitialLoad(false);
        }, []);

        // 自動保存 (入力から1秒後)
        useEffect(() => {
            if (isInitialLoad) return;
            const timer = setTimeout(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...doc, charsPerLine: settings.charsPerLine, kinsokuMode: settings.kinsokuMode }));
            }, 1000);
            return () => clearTimeout(timer);
        }, [doc, settings, isInitialLoad]);

        const parsedGenko = useGenkoParser(doc, settings);

        // --- アクションハンドラ ---

        const handleNew = () => {
            Swal.fire({
                title: '新しく書く',
                text: '今書いている内容は消えます。よろしいですか？',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'はい、消して新しく書く',
                cancelButtonText: 'いいえ'
            }).then((result) => {
                if (result.isConfirmed) {
                    setDoc({ title: '', class: '', name: '', content: '' });
                    Toast.fire({ icon: 'success', title: '新しく始めました' });
                }
            });
        };

        const handleDownload = () => {
            if(!doc.content && !doc.title) {
                Swal.fire({ icon: 'warning', text: 'まだ何も書いていません' });
                return;
            }
            const textContent = `【題名】${doc.title}\n【学年】${doc.class}\n【氏名】${doc.name}\n---------------------------\n${doc.content}`;
            const blob = new Blob([textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            let filename = `${doc.title}_${doc.name}`.replace(/[\/\\:*?"<>|]/g, '');
            if(filename === '_') filename = `作文_${new Date().toLocaleDateString().replace(/\//g,'-')}`;
            
            a.href = url;
            a.download = filename + '.txt';
            a.click();
            URL.revokeObjectURL(url);
        };

        const handleLoad = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    const headerRegex = /【題名】(.*)\n【学年】(.*)\n【氏名】(.*)\n-{10,}\n([\s\S]*)/;
                    const match = text.match(headerRegex);
                    if (match) {
                        setDoc({ title: match[1].trim(), class: match[2].trim(), name: match[3].trim(), content: match[4].trim() });
                        Toast.fire({ icon: 'success', title: '読み込みました' });
                    } else {
                        Swal.fire({
                            title: '確認', text: '題名などの情報が見つかりません。すべて「本文」に読み込みますか？',
                            icon: 'question', showCancelButton: true, confirmButtonText: '読み込む', confirmButtonColor: '#f59e0b'
                        }).then((result) => {
                            if (result.isConfirmed) {
                                setDoc(prev => ({ ...prev, content: text }));
                                Toast.fire({ icon: 'success', title: '読み込みました' });
                            }
                        });
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        };

        return (
            <div className="h-screen w-full flex flex-col font-sans">
                <Header onSettingClick={() => setSettingsModalOpen(true)} />
                
                {/* 【変更点】 スマホではボタンを下に、本文とプレビューを並べるためにGridレイアウトを採用 */}
                <main className="flex-1 grid grid-cols-1 md:grid-cols-[380px_1fr] lg:grid-cols-[420px_1fr] md:grid-rows-[1fr_auto] p-2 md:p-4 gap-2 md:gap-4 overflow-hidden h-full no-print">
                    
                    {/* 1. 入力エリア (スマホ: 1番目, PC: 左カラム上部) */}
                    <div className="order-1 md:col-start-1 md:row-start-1 bg-white rounded-2xl md:rounded-b-none shadow-sm border border-slate-200 flex flex-col overflow-hidden min-h-[25vh] md:min-h-0 z-10 md:border-b-0">
                        <div className="p-4 md:p-5 border-b border-slate-100 bg-slate-50 shrink-0">
                            <div className="text-sm font-bold text-slate-500 mb-2 pt-1 leading-loose">
                                <i className="bi bi-person-vcard"></i> <Rb t="基本情報" r="きほんじょうほう"/>
                            </div>
                            <input type="text" name="title" value={doc.title} onChange={handleChange} placeholder="だいめい" 
                                   className="w-full px-4 py-3 mb-3 border border-slate-200 rounded-xl outline-none focus:border-amber-400 focus:ring-2 focus:ring-amber-100 font-bold text-lg transition-all bg-white text-slate-800" />
                            <div className="flex gap-3">
                                <input type="text" name="class" value={doc.class} onChange={handleChange} placeholder="がくねん・くみ" 
                                       className="w-1/3 px-4 py-2 border border-slate-200 rounded-xl outline-none focus:border-amber-400 focus:ring-2 focus:ring-amber-100 transition-all bg-white text-slate-800 text-sm" />
                                <input type="text" name="name" value={doc.name} onChange={handleChange} placeholder="なまえ" 
                                       className="flex-1 px-4 py-2 border border-slate-200 rounded-xl outline-none focus:border-amber-400 focus:ring-2 focus:ring-amber-100 transition-all bg-white text-slate-800 text-sm" />
                            </div>
                        </div>

                        <div className="flex-1 relative bg-amber-50/30 min-h-[100px]">
                            <textarea 
                                ref={textareaRef}
                                onScroll={handleTextareaScroll}
                                name="content" value={doc.content} onChange={handleChange}
                                placeholder="ここをクリックして、さくぶんをかいてください..."
                                className="w-full h-full resize-none border-none p-4 md:p-6 text-lg focus:outline-none focus:bg-amber-50/60 text-slate-800 leading-[2.5rem] bg-transparent hide-scrollbar transition-colors"
                                style={{ 
                                    backgroundImage: 'linear-gradient(to bottom, transparent calc(100% - 1px), #cbd5e1 calc(100% - 1px))',
                                    backgroundSize: '100% 2.5rem',
                                    backgroundPosition: '0 1.5rem',
                                    backgroundAttachment: 'local'
                                }}
                            />
                            <div className="absolute bottom-4 right-4 bg-white/90 px-4 py-1.5 rounded-full shadow-sm border border-slate-200 text-sm font-bold text-amber-600 backdrop-blur-sm pointer-events-none">
                                {charCount.toLocaleString()} <Rb t="文字" r="もじ"/>
                            </div>
                        </div>
                    </div>

                    {/* 2. プレビューエリア (スマホ: 2番目, PC: 右カラム全体) */}
                    <div className="order-2 md:col-start-2 md:row-start-1 md:row-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden relative min-w-0 min-h-[40vh] md:min-h-0">
                        <div className="absolute top-2 right-2 md:top-4 md:right-4 z-20">
                            <button onClick={() => window.print()} className="px-3 pt-2 pb-1.5 md:px-4 md:pt-3 md:pb-2 rounded-xl font-bold text-amber-600 bg-amber-50 hover:bg-amber-100 border border-amber-200 transition-all active:scale-95 flex items-center gap-2 shadow-sm leading-loose">
                                <i className="bi bi-printer text-[16px] md:text-[18px] -mt-1"></i><span className="text-sm md:text-base"><Rb t="印刷" r="いんさつ"/>する</span>
                            </button>
                        </div>
                        <ScalableWrapper scrollContainerRef={previewContainerRef} onScroll={handlePreviewScroll}>
                            <GenkoPaperPreview parsedGenko={parsedGenko} settings={settings} />
                        </ScalableWrapper>
                    </div>

                    {/* 3. ボタンエリア (スマホ: 3番目, PC: 左カラム下部) */}
                    <div className="order-3 md:col-start-1 md:row-start-2 p-3 md:p-5 border border-slate-200 bg-white rounded-2xl md:rounded-t-none md:border-t-0 grid grid-cols-2 gap-2 md:gap-3 shrink-0 shadow-sm z-10">
                        <button onClick={handleNew} className="flex items-center justify-center gap-2 pt-3 pb-2 md:pt-4 md:pb-2.5 border border-slate-200 rounded-xl bg-slate-50 hover:bg-slate-100 font-bold text-slate-700 transition-all active:scale-95 leading-loose">
                            <i className="bi bi-file-earmark-plus text-[18px]"></i> <span><Rb t="新規" r="しんき"/></span>
                        </button>
                        <button onClick={handleLoad} className="flex items-center justify-center gap-2 pt-3 pb-2 md:pt-4 md:pb-2.5 border border-amber-200 rounded-xl bg-amber-50 hover:bg-amber-100 text-amber-700 font-bold transition-all active:scale-95 leading-loose">
                            <i className="bi bi-folder2-open text-[18px]"></i> <span><Rb t="開" r="ひら"/>く</span>
                        </button>
                        <button onClick={handleDownload} className="col-span-2 flex items-center justify-center gap-2 pt-3 pb-2 md:pt-4 md:pb-3 bg-gradient-to-r from-slate-700 to-slate-800 text-white rounded-xl font-bold hover:from-slate-800 hover:to-slate-900 transition-all active:scale-95 shadow-md hover:shadow-lg leading-loose">
                            <i className="bi bi-download text-[18px]"></i> <span><Rb t="保存" r="ほぞん"/>する</span>
                        </button>
                    </div>

                </main>

                {/* フッター */}
                <footer className="flex-shrink-0 w-full bg-white border-t border-slate-200 pt-3 pb-2 text-center text-xs md:text-sm text-slate-500 font-bold no-print z-40 shadow-sm relative">
                    &copy; 2026 オンライン原稿用紙 Lite. <a href="https://note.com/cute_borage86" target="_blank" rel="noopener noreferrer" className="text-inherit no-underline hover:opacity-80 transition-opacity">GIGA山</a>
                </footer>

                {/* 印刷用DOM */}
                <PrintGenkoView parsedGenko={parsedGenko} settings={settings} doc={doc} />

                {/* 設定モーダル */}
                <Modal isOpen={isSettingsModalOpen} onClose={() => setSettingsModalOpen(false)} title={<><Rb t="設定" r="せってい"/></>}>
                    <div className="space-y-8 p-2">
                        {/* 用紙の文字数 */}
                        <div>
                            <h4 className="font-bold text-slate-800 text-[1.1rem] mb-4"><Rb t="用紙" r="ようし"/>の<Rb t="文字数" r="もじすう"/></h4>
                            <div className="space-y-5 pl-2">
                                <label className="flex items-start gap-4 cursor-pointer group">
                                    <div className="relative flex items-center justify-center mt-1 shrink-0">
                                        <input type="radio" name="chars" checked={settings.charsPerLine === 20} onChange={() => setSettings({...settings, charsPerLine: 20})} className="peer appearance-none w-[22px] h-[22px] border-[2.5px] border-slate-300 rounded-full checked:border-teal-600 transition-all cursor-pointer bg-white" />
                                        <div className="absolute w-[10px] h-[10px] bg-teal-600 rounded-full opacity-0 peer-checked:opacity-100 transition-all pointer-events-none"></div>
                                    </div>
                                    <span className="font-bold text-slate-800 text-[1.1rem]">20<Rb t="文字" r="もじ"/> × 20<Rb t="行" r="ぎょう"/> (<Rb t="高学年" r="こうがくねん"/>)</span>
                                </label>
                                <label className="flex items-start gap-4 cursor-pointer group">
                                    <div className="relative flex items-center justify-center mt-1 shrink-0">
                                        <input type="radio" name="chars" checked={settings.charsPerLine === 15} onChange={() => setSettings({...settings, charsPerLine: 15})} className="peer appearance-none w-[22px] h-[22px] border-[2.5px] border-slate-300 rounded-full checked:border-teal-600 transition-all cursor-pointer bg-white" />
                                        <div className="absolute w-[10px] h-[10px] bg-teal-600 rounded-full opacity-0 peer-checked:opacity-100 transition-all pointer-events-none"></div>
                                    </div>
                                    <span className="font-bold text-slate-800 text-[1.1rem]">15<Rb t="文字" r="もじ"/> × 16<Rb t="行" r="ぎょう"/> (<Rb t="低学年" r="ていがくねん"/>)</span>
                                </label>
                            </div>
                        </div>

                        {/* 禁則処理 */}
                        <div>
                            <h4 className="font-bold text-slate-800 text-[1.1rem] mb-4"><Rb t="禁則処理" r="きんそくしょり"/></h4>
                            <div className="space-y-5 pl-2">
                                <label className="flex items-start gap-4 cursor-pointer group">
                                    <div className="relative flex items-center justify-center mt-1 shrink-0">
                                        <input type="radio" name="kinsoku" checked={settings.kinsokuMode === 'oidashi'} onChange={() => setSettings({...settings, kinsokuMode: 'oidashi'})} className="peer appearance-none w-[22px] h-[22px] border-[2.5px] border-slate-300 rounded-full checked:border-teal-600 transition-all cursor-pointer bg-white" />
                                        <div className="absolute w-[10px] h-[10px] bg-teal-600 rounded-full opacity-0 peer-checked:opacity-100 transition-all pointer-events-none"></div>
                                    </div>
                                    <span className="font-bold text-slate-800 text-[1.1rem] leading-relaxed">
                                        <Rb t="追" r="お"/>い<Rb t="出" r="だ"/>し <span className="font-medium text-slate-600 text-[1rem]">（<Rb t="前行末" r="ぜんぎょうまつ"/>の<Rb t="文字" r="もじ"/>を<Rb t="次行" r="じぎょう"/>に<Rb t="送" r="おく"/>る）</span>
                                    </span>
                                </label>
                                <label className="flex items-start gap-4 cursor-pointer group">
                                    <div className="relative flex items-center justify-center mt-1 shrink-0">
                                        <input type="radio" name="kinsoku" checked={settings.kinsokuMode === 'burasagari'} onChange={() => setSettings({...settings, kinsokuMode: 'burasagari'})} className="peer appearance-none w-[22px] h-[22px] border-[2.5px] border-slate-300 rounded-full checked:border-teal-600 transition-all cursor-pointer bg-white" />
                                        <div className="absolute w-[10px] h-[10px] bg-teal-600 rounded-full opacity-0 peer-checked:opacity-100 transition-all pointer-events-none"></div>
                                    </div>
                                    <span className="font-bold text-slate-800 text-[1.1rem] leading-relaxed">
                                        ぶら<Rb t="下" r="さ"/>がり <span className="font-medium text-slate-600 text-[1rem]">（マス<Rb t="外" r="そと"/>に<Rb t="小" r="ちい"/>さく<Rb t="表示" r="ひょうじ"/>）</span>
                                    </span>
                                </label>
                            </div>
                        </div>

                        <div className="flex justify-end pt-4">
                            <button onClick={() => setSettingsModalOpen(false)} className="px-8 pt-3 pb-2 rounded-xl bg-slate-800 text-white font-bold hover:bg-slate-700 transition-all active:scale-95 shadow-sm leading-loose">
                                <Rb t="保存" r="ほぞん"/>して<Rb t="閉" r="と"/>じる
                            </button>
                        </div>
                    </div>
                </Modal>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
